name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    name: Secret Scanning (Trufflehog)
    runs-on: ubuntu-latest

    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # STEP 1 — Verified scan (hard gate)
      # Fails the pipeline on confirmed live credentials
      - name: Trufflehog — Verified secrets (hard gate)
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          path: ./
          extra_args: --only-verified

      # STEP 2 — Unverified scan (soft warning)
      # Reports all pattern matches — does NOT fail the pipeline
      # Catches fake/rotated keys that still shouldn't be in code
      - name: Trufflehog — Unverified secrets (soft warning)
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          path: ./
          extra_args:
        continue-on-error: true         # Warning only — does not block merge