---
name: DevSecOps Security Pipeline

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — SECRET SCANNING
  # Runs FIRST — a leaked credential is the most
  # critical finding. Fail fast on the worst problems.
  #
  # fetch-depth: 0 — scan full git history, not just
  # latest commit. Deleted secrets are still exposed.
  # ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Trufflehog)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # HARD GATE — verified secrets block the pipeline
      - name: Trufflehog — Hard gate (verified secrets)
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          path: ./
          extra_args: --only-verified

      # SOFT WARNING — unverified patterns, never blocks PR
      - name: Trufflehog — Soft warning (unverified patterns)
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          path: ./
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # JOB 2 — SAST (Static Application Security Testing)
  # Runs in PARALLEL with Job 1 — no dependency needed
  # because it scans source code, not git history.
  #
  # Semgrep understands code structure and data flow.
  # It traces tainted user input from source to sink.
  # Trufflehog cannot do this — they are complementary.
  #
  # Rules used:
  #   p/owasp-top-ten  — SQL injection, XSS, CMDi etc
  #   p/secrets        — hardcoded credentials (defence in depth)
  #   p/python         — Python-specific security patterns
  #   sarif            standard output format for GitHub Security tab
  #   error            exit code 1 on any findings = hard gate
  #   src/             explicit target = source code only
  # ─────────────────────────────────────────────────────────
  sast-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write        # Required to upload SARIF to Security tab

    container:
      image: semgrep/semgrep        # Official Semgrep Docker image
      # Semgrep pre-installed, no pip install needed
      # Pin to specific version in production:
      # semgrep/semgrep:1.76.0

    # Skip Dependabot PRs — no token access to run scans
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep — full repo scan
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            src/

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Upload even when scan finds issues
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
